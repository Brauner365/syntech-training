<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Syntech — Training Portal</title>
<style>
:root{--g:#00C853;--gd:rgba(0,200,83,0.12);--k:#0A0A0A;--s:#111;--s2:#1A1A1A;--s3:#222;--b:rgba(255,255,255,0.08);--bs:rgba(255,255,255,0.15);--t:#F0F0F0;--tm:#888;--td:#555;--r:#FF4444;--a:#FFAA00;--bl:#378ADD;--pk:#D4537E;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono',monospace;--rad:8px;--radl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--k);color:var(--t);font-family:var(--f);font-size:14px;line-height:1.6;min-height:100vh;}
/* HEADER */
.hd{background:var(--s);border-bottom:1px solid var(--b);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-size:12px;font-weight:700;letter-spacing:.12em;}.logo span{color:var(--g);}
.tb{padding:4px 12px;border-radius:20px;border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all .15s;}
.tb.on{background:var(--g);color:#000;border-color:var(--g);}
.rb{padding:4px 10px;border-radius:var(--rad);border:1px solid var(--b);background:transparent;color:var(--td);font-size:11px;cursor:pointer;font-family:var(--f);}
.rb:hover{border-color:var(--r);color:var(--r);}
/* MAIN TABS */
.mt{display:flex;background:var(--s);border-bottom:1px solid var(--b);padding:0 20px;position:sticky;top:52px;z-index:99;}
.mt-btn{padding:12px 18px;font-size:13px;font-weight:500;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.mt-btn.on{color:var(--g);border-bottom-color:var(--g);}
/* VIEWS */
.vw{display:none;}.vw.on{display:block;}
/* PLAN LAYOUT */
.pl{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 100px);}
.sb{background:var(--s);border-right:1px solid var(--b);position:sticky;top:100px;height:calc(100vh - 100px);overflow-y:auto;padding:8px 0;}
.sb-sec{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--td);text-transform:uppercase;padding:10px 14px 4px;}
.sb-row{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;transition:background .12s;border-left:2px solid transparent;}
.sb-row:hover{background:var(--s2);}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--td);flex-shrink:0;}
.sb-dot.dn{background:var(--g);}.sb-dot.lk{opacity:.3;}
.sb-nm{font-size:12px;color:var(--tm);flex:1;}
.sb-bg{font-size:10px;padding:1px 5px;border-radius:6px;font-family:var(--m);}
.bg-d{background:var(--gd);color:var(--g);}.bg-l{background:rgba(255,170,0,.1);color:var(--a);}.bg-a{background:rgba(55,138,221,.1);color:var(--bl);}
/* OVERVIEW */
.ov{background:var(--s2);border-bottom:1px solid var(--b);padding:10px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.ov-n{font-size:18px;font-weight:700;color:var(--g);font-family:var(--m);line-height:1;}
.ov-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.06em;}
.pt{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.pf{height:100%;background:var(--g);border-radius:2px;transition:width .4s;}
.tc{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--s3);border-radius:20px;border:1px solid var(--b);}
.av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
/* PLAN MAIN */
.pm{padding:18px 22px;}
/* STAGE CARD */
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);margin-bottom:10px;overflow:hidden;}
.sc.lk{border-color:rgba(255,170,0,.2);}.sc.dn{border-color:rgba(0,200,83,.25);}
.sh{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .12s;}
.sh:hover{background:var(--s2);}
.sn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bs);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tm);font-family:var(--m);flex-shrink:0;}
.sc.dn .sn{border-color:var(--g);background:var(--gd);color:var(--g);}
.sc.lk .sn{border-color:rgba(255,170,0,.4);color:var(--a);}
.st{font-size:14px;font-weight:600;margin-bottom:1px;}.ss{font-size:11px;color:var(--tm);}
.wt{font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--m);font-weight:600;}
.wr{background:rgba(55,138,221,.15);color:var(--bl);}.wa{background:rgba(255,170,0,.15);color:var(--a);}.ws{background:rgba(212,83,126,.15);color:var(--pk);}.wt2{background:var(--gd);color:var(--g);}
.cv{color:var(--td);transition:transform .2s;flex-shrink:0;}
.sc.op .cv{transform:rotate(180deg);}
.sb2{display:none;border-top:1px solid var(--b);}.sc.op .sb2{display:block;}
/* LOCKED */
.ln{padding:12px 16px;display:flex;align-items:center;gap:10px;background:rgba(255,170,0,.03);}
.lt{font-size:12px;color:var(--tm);}.lt strong{color:var(--a);}
/* PILLARS */
.ps{border-bottom:1px solid var(--b);}.ps:last-of-type{border-bottom:none;}
.ph{display:flex;align-items:center;gap:7px;padding:7px 16px;background:var(--s2);}
.pd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pn{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;flex:1;}
.pp{font-size:10px;color:var(--td);font-family:var(--m);}
/* TASKS */
.tl{padding:4px 16px 8px;}
.ti{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.ti:last-child{border-bottom:none;}
.ck{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--bs);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.ck:hover{border-color:var(--g);}.ck.on{background:var(--g);border-color:var(--g);}
.ck.on::after{content:'';width:7px;height:4px;border-left:2px solid #000;border-bottom:2px solid #000;transform:rotate(-45deg) translateY(-1px);display:block;}
.tx{font-size:12.5px;color:var(--t);line-height:1.5;}
.ti.dn .tx{color:var(--td);text-decoration:line-through;}
.tg{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;margin-top:2px;display:inline-block;}
.tg-z{background:rgba(55,138,221,.1);color:#85B7EB;}.tg-n{background:rgba(99,153,34,.1);color:#97C459;}.tg-s{background:rgba(212,83,126,.1);color:#ED93B1;}
.kp{font-size:10px;color:var(--td);font-family:var(--m);margin-top:2px;display:inline-block;margin-left:6px;}
/* KPI */
.ks{display:flex;border-top:1px solid var(--b);}
.ki{flex:1;padding:8px 12px;border-right:1px solid var(--b);text-align:center;}.ki:last-child{border-right:none;}
.kn{font-size:15px;font-weight:700;color:var(--g);font-family:var(--m);}.kl{font-size:10px;color:var(--td);margin-top:1px;}
/* SIGNOFF */
.sg{margin:0 16px 16px;background:var(--s2);border:1px solid var(--b);border-radius:var(--radl);overflow:hidden;}
.sg-t{padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);border-bottom:1px solid var(--b);}
.sg-g{display:grid;grid-template-columns:repeat(3,1fr);}
.sg-i{padding:10px 12px;border-right:1px solid var(--b);display:flex;flex-direction:column;gap:5px;}.sg-i:last-child{border-right:none;}
.sg-p{display:flex;align-items:center;gap:6px;}
.sg-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.az{background:rgba(55,138,221,.2);color:var(--bl);}.an{background:rgba(99,153,34,.2);color:#97C459;}.as{background:rgba(212,83,126,.2);color:var(--pk);}
.sg-nm{font-size:12px;font-weight:500;}.sg-rl{font-size:10px;color:var(--td);}
.sg-btn{width:100%;padding:5px 0;border-radius:var(--rad);border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all .15s;}
.sg-btn:hover:not(.on):not(.off){border-color:var(--g);color:var(--g);}
.sg-btn.on{background:var(--gd);border-color:var(--g);color:var(--g);cursor:default;}
.sg-btn.off{opacity:.3;cursor:not-allowed;}
.sg-ts{font-size:10px;color:var(--td);font-family:var(--m);}
.gb{padding:7px 12px;border-top:1px solid var(--b);display:flex;align-items:center;gap:7px;}
.gd2{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.gd2.lk{background:var(--td);}.gd2.pt{background:var(--a);}.gd2.op{background:var(--g);}
.gt{font-size:12px;color:var(--tm);flex:1;}.gt strong{color:var(--t);}
.ub{padding:5px 12px;border-radius:var(--rad);border:1px solid var(--g);background:var(--gd);color:var(--g);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);display:none;}
.ub.on{display:block;}.ub:hover{background:var(--g);color:#000;}
.cb{margin:8px 16px;padding:8px 12px;background:var(--gd);border:1px solid rgba(0,200,83,.3);border-radius:var(--rad);font-size:12px;color:var(--g);display:none;}
.cb.on{display:block;}
/* MODULE CARDS ON PLAN PAGE */
.mc-sec{margin-top:28px;}
.mc-hdr{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--td);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--b);margin-bottom:4px;}
.mc-hdr span{color:var(--g);font-family:var(--m);text-transform:none;letter-spacing:0;font-size:11px;}
.mc-sub{font-size:12px;color:var(--tm);margin-bottom:14px;}
.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:30px;}
.mc{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s;}
.mc:hover{border-color:var(--bs);}
.mc-top{display:flex;align-items:center;gap:8px;}
.mc-ic{font-size:17px;flex-shrink:0;}
.mc-ti{font-size:13px;font-weight:600;flex:1;}
.mc-tm{font-size:10px;font-family:var(--m);color:var(--g);background:var(--gd);padding:2px 6px;border-radius:3px;white-space:nowrap;}
.mc-lrn{font-size:12px;color:var(--tm);line-height:1.6;}
.mc-lrn strong{color:var(--t);}
.mc-com{font-size:12px;color:var(--a);line-height:1.6;background:rgba(255,170,0,.05);border-radius:var(--rad);padding:7px 9px;border-left:2px solid var(--a);}
.mc-ms{font-size:11px;color:var(--td);}
.mc-ms strong{color:var(--tm);}
.mc-btn{padding:5px 10px;border-radius:var(--rad);border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:11px;cursor:pointer;font-family:var(--f);transition:all .15s;align-self:flex-start;}
.mc-btn:hover{border-color:var(--g);color:var(--g);}
/* MODULES TAB */
.mv{padding:18px 22px;max-width:980px;}
.mn-nav{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--b);}
.mn-btn{padding:6px 12px;border-radius:var(--rad);border:1px solid var(--b);background:var(--s);color:var(--tm);font-size:12px;cursor:pointer;font-family:var(--f);transition:all .15s;}
.mn-btn:hover{border-color:var(--bs);color:var(--t);}
.mn-btn.on{border-color:var(--g);background:var(--gd);color:var(--g);}
.mp{display:none;}.mp.on{display:block;}
/* MODULE CONTENT STYLES */
.section{margin-bottom:26px;}
.sec-t{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b);}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);padding:14px 18px;margin-bottom:8px;}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;}.card-body{font-size:13px;color:var(--tm);line-height:1.7;}
.tip{background:var(--gd);border:1px solid rgba(0,200,83,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--g);margin:8px 0;}
.warn{background:rgba(255,170,0,.07);border:1px solid rgba(255,170,0,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--a);margin:8px 0;}
.danger{background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--r);margin:8px 0;}
.code{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:10px 14px;font-family:var(--m);font-size:12px;color:#97C459;margin:8px 0;line-height:1.9;overflow-x:auto;white-space:pre-wrap;}
.step{display:flex;gap:10px;margin-bottom:10px;}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--s2);border:1px solid var(--bs);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--g);font-family:var(--m);margin-top:1px;}
.step-c{flex:1;}.step-t{font-size:13px;font-weight:600;margin-bottom:1px;}.step-b{font-size:12px;color:var(--tm);line-height:1.6;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;margin:2px;font-weight:500;}
.pg{background:var(--gd);color:var(--g);}.pb{background:rgba(55,138,221,.12);color:var(--bl);}.pa{background:rgba(255,170,0,.1);color:var(--a);}.pp{background:rgba(212,83,126,.1);color:var(--pk);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--td);padding:6px 10px;border-bottom:1px solid var(--b);}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--tm);}
tr:last-child td{border-bottom:none;}
.li{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:13px;color:var(--tm);}
.li::before{content:'→';color:var(--g);flex-shrink:0;margin-top:1px;}
.note{background:var(--s2);border-radius:var(--rad);padding:10px 14px;font-size:12px;color:var(--tm);margin-top:8px;border-left:3px solid var(--g);}
.indc{background:rgba(55,138,221,.07);border:1px solid rgba(55,138,221,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--bl);margin-top:10px;font-family:var(--m);}
.signal{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
.spec-card{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);overflow:hidden;margin-bottom:16px;}
.spec-header{padding:16px 20px;border-bottom:1px solid var(--b);background:var(--s2);}
.spec-job{font-size:17px;font-weight:700;margin-bottom:3px;}.spec-co{font-size:13px;color:var(--g);margin-bottom:8px;}
.spec-pills{display:flex;flex-wrap:wrap;gap:5px;}
.spec-pill{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.spec-body{padding:16px 20px;}
.tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500;}
.stat-card{background:var(--s2);border:1px solid var(--b);border-radius:var(--radl);padding:12px 16px;text-align:center;}
.stat-num{font-size:20px;font-weight:700;font-family:var(--m);color:var(--g);line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:.06em;}
.insight{background:rgba(55,138,221,.05);border:1px solid rgba(55,138,221,.2);border-radius:var(--rad);padding:10px 12px;font-size:12px;color:var(--bl);margin:8px 0;}
.opp{background:rgba(212,83,126,.05);border:1px solid rgba(212,83,126,.2);border-radius:var(--rad);padding:10px 12px;font-size:12px;color:var(--pk);margin:8px 0;}
.spec-preview{background:var(--s);border:1px solid rgba(0,200,83,.3);border-radius:var(--radl);padding:16px 20px;margin:10px 0;font-size:13px;}
.spec-preview p{margin-bottom:7px;color:var(--tm);}
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:14px;}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--g);border-bottom-color:var(--g);}
/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--s2);border:1px solid var(--bs);border-radius:var(--radl);padding:9px 12px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;max-width:240px;}
.toast.on{transform:translateY(0);opacity:1;}
.toast-t{font-weight:600;margin-bottom:1px;color:var(--t);}.toast-b{font-size:11px;color:var(--tm);}
</style>
</head>
<body>
<header class="hd">
  <div class="logo">SYNTECH <span>RECRUITMENT</span> <span style="color:var(--td);font-weight:400;font-size:10px;margin-left:8px">Training Portal</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="tb on" id="btn-a" onclick="setTrainee('ayaan')">Ayaan</button>
    <button class="tb" id="btn-j" onclick="setTrainee('jade')">Jade</button>
    <button class="rb" onclick="doReset()">↺ Reset</button>
  </div>
</header>
<div class="mt">
  <div class="mt-btn on" id="tab-plan" onclick="setView('plan')">📋 Training Plan</div>
  <div class="mt-btn" id="tab-modules" onclick="setView('modules')">📚 Training Modules</div>
</div>

<!-- PLAN VIEW -->
<div class="vw on" id="view-plan">
  <div class="pl">
    <aside class="sb" id="sidebar"></aside>
    <div style="display:flex;flex-direction:column">
      <div class="ov" id="overview"></div>
      <div class="pm" id="plan-main"></div>
    </div>
  </div>
</div>

<!-- MODULES VIEW -->
<div class="vw" id="view-modules">
  <div class="mv">
    <div class="mn-nav">
      <button class="mn-btn on" onclick="setMod('cv-library',this)">🔍 CV Library</button>
      <button class="mn-btn" onclick="setMod('indeed',this)">📋 Indeed</button>
      <button class="mn-btn" onclick="setMod('xray',this)">🌐 X-Ray Search</button>
      <button class="mn-btn" onclick="setMod('linkedin',this)">💼 LinkedIn</button>
      <button class="mn-btn" onclick="setMod('atlas',this)">🗃️ Atlas ATS</button>
      <button class="mn-btn" onclick="setMod('revmkt',this)">🎯 Reverse Marketing</button>
      <button class="mn-btn" onclick="setMod('comms',this)">📞 Client Comms</button>
      <button class="mn-btn" onclick="setMod('delays',this)">⚡ Delays</button>
      <button class="mn-btn" onclick="setMod('jobs',this)">📄 Job Specs</button>
      <button class="mn-btn" onclick="setMod('camberley',this)">🏭 Camberley Signs</button>
    </div>
    <div id="mod-content"></div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-t" id="toast-t"></div><div class="toast-b" id="toast-b"></div></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────

const STAGES = {
  ayaan:[
    {id:'a1',title:'Stage 1 — Foundations',sub:'Learn the desk, shadow live roles',wk:'Week 1',wc:'wr',
     kpis:[{n:'2',l:'Roles observed'},{n:'10',l:'CVs reviewed'},{n:'1',l:'Shortlist built'}],
     pillars:[
      {nm:'Zac — Delivery & Pitch',ow:'z',cl:'#378ADD',tasks:[
        {id:'a1z1',tx:'Shadow Zac on 2 live roles — full LinkedIn sourcing workflow observed',kp:'Day 1–2'},
        {id:'a1z2',tx:'Learn the 3-step candidate pitch: hook, match, close',kp:'Day 2'},
        {id:'a1z3',tx:'Build first shortlist of 10 candidates on a live job — Zac reviews every profile',kp:'Day 3–4'},
        {id:'a1z4',tx:'Understand what a strong vs weak profile looks like on Syntech roles',kp:'Day 5'},
      ]},
      {nm:'Nick — ATS & Process',ow:'n',cl:'#639922',tasks:[
        {id:'a1n1',tx:'Atlas ATS walkthrough — adding candidates, notes, files, client contacts, pipeline',kp:'Day 2'},
        {id:'a1n2',tx:'Complete Atlas ATS training module and pass the basics checklist',kp:'Day 3'},
        {id:'a1n3',tx:'Learn candidate submission format and what goes into each Atlas record',kp:'Day 3'},
      ]},

const MODS = {
'cv-library': `<div class="section"><div class="sec-t">What is CV Library?</div><div class="card"><div class="card-body">CV Library is one of the UK's largest job boards and CV databases. As a recruiter you have two uses: posting jobs to attract applicants, and searching the CV database to proactively find candidates. The database search is where most of your sourcing time is spent.</div></div></div>
<div class="section"><div class="sec-t">Running your first search</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Log in and go to CV Search</div><div class="step-b">From the recruiter dashboard click CV Search in the top nav. Search panel on the left, results on the right.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Enter keywords</div><div class="step-b">Start with the job title or core skill. Vinyl Tech: "vinyl graphics". Welder: "TIG welder" or "welder fabricator". Keep it simple first.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Set location and radius</div><div class="step-b">Enter Yateley or GU46. Start with 20-mile radius. Thin results: extend to 30. Too many: tighten to 10.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Filter by last active</div><div class="step-b">Set "Last updated" to within 3–6 months. CVs older than a year are usually not in the market. This single filter removes most dead leads.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Review and shortlist</div><div class="step-b">Scan results. Look for: job title match, location, most recent employer, last active date. Flag strong profiles to your shortlist.</div></div></div>
</div>
<div class="section"><div class="sec-t">Boolean operators</div>
<table><thead><tr><th>Operator</th><th>What it does</th><th>Example</th></tr></thead><tbody>
<tr><td><span class="pill pg">AND</span></td><td>Both terms must appear</td><td>TIG AND aluminium</td></tr>
<tr><td><span class="pill pb">OR</span></td><td>Either term</td><td>vinyl OR graphics OR signage</td></tr>
<tr><td><span class="pill pa">NOT</span></td><td>Excludes that term</td><td>welder NOT structural</td></tr>
<tr><td><span class="pill pp">"quotes"</span></td><td>Exact phrase</td><td>"vinyl graphics technician"</td></tr>
<tr><td><span class="pill pg">(brackets)</span></td><td>Groups terms</td><td>(TIG OR MIG) AND aluminium</td></tr>
</tbody></table>
<div class="code">Vinyl role: "vinyl graphics" OR "vinyl wrap" OR signage AND (Gerber OR plotter OR Zund)
Welder role: (TIG OR "TIG welding") AND (aluminium OR stainless) AND fabricat*</div>
<div class="tip">The asterisk * is a wildcard. fabricat* matches fabricate, fabricator, fabrication.</div>
</div>
<div class="section"><div class="sec-t">Saved searches and alerts</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Save your search</div><div class="step-b">Once you have a working string, click Save Search and name it clearly — e.g. "Vinyl Tech GU46 20mi".</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Set a CV alert</div><div class="step-b">Enable Email Alert on your saved search, set to daily. CV Library emails you when new matching CVs are uploaded. Passive sourcing that runs while you work other roles.</div></div></div>
<div class="warn">Delete alerts for roles you have filled. A cluttered inbox trains you to ignore everything — including the important ones.</div>
</div>
<div class="section"><div class="sec-t">What to look for when reviewing</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">Green flags</div><div class="card-body">Job title matches or closely related. Based within 20 miles. Active in last 3 months. Stable employment history. Specific tools named that match the spec.</div></div>
<div class="card"><div class="card-title" style="color:var(--r)">Red flags</div><div class="card-body">CV last updated over a year ago. Too many short tenures under 6 months. Location is borderline — check commute. Vague about what software or equipment used.</div></div>
</div></div>`,

'indeed': `<div class="section"><div class="sec-t">Indeed for recruiters — two modes</div>
<div class="g2">
<div class="card"><div class="card-title">Job posting (active)</div><div class="card-body">You post a job ad and wait for applications. Syntech uses Indeed for this on most roles. The INDC tag tracks which applications came from Indeed.</div></div>

'xray': `<div class="section"><div class="sec-t">What is X-Ray searching?</div>
<div class="card"><div class="card-body">X-Ray searching is using Google's advanced operators to search inside specific websites — including LinkedIn, CV databases, GitHub, and personal sites. Many strong candidates have their CV or LinkedIn profile indexed by Google even if they are not actively on job boards. X-Ray finds them.</div></div>
</div>
<div class="section"><div class="sec-t">Core operators</div>
<table><thead><tr><th>Operator</th><th>What it does</th><th>Example</th></tr></thead><tbody>
<tr><td style="font-family:var(--m)">site:</td><td>Searches only within a specific website</td><td>site:linkedin.com/in TIG welder Hampshire</td></tr>
<tr><td style="font-family:var(--m)">"quotes"</td><td>Exact phrase match</td><td>"vinyl graphics technician"</td></tr>
<tr><td style="font-family:var(--m)">-word</td><td>Excludes that word</td><td>welder -recruitment -agency</td></tr>
<tr><td style="font-family:var(--m)">OR</td><td>Either term</td><td>TIG OR MIG welder</td></tr>
<tr><td style="font-family:var(--m)">filetype:</td><td>Specific file types</td><td>filetype:pdf "welder fabricator" Hampshire</td></tr>
<tr><td style="font-family:var(--m)">intitle:</td><td>Searches page titles</td><td>intitle:"welder fabricator" CV</td></tr>
</tbody></table>
</div>
<div class="section"><div class="sec-t">Ready-to-use strings for Camberley Signs roles</div>
<div style="font-size:11px;color:var(--td);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Vinyl Tech — LinkedIn</div>
<div class="code">site:linkedin.com/in ("vinyl graphics" OR "vinyl technician" OR signage) (Hampshire OR Surrey OR Berkshire OR GU OR RG)</div>
<div style="font-size:11px;color:var(--td);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">Welder Fabricator — LinkedIn</div>
<div class="code">site:linkedin.com/in ("TIG welder" OR "welder fabricator") (aluminium OR stainless) (Hampshire OR Surrey OR Berkshire)</div>
<div style="font-size:11px;color:var(--td);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">Find PDF CVs</div>
<div class="code">filetype:pdf ("welder fabricator" OR "TIG welder") (Hampshire OR Yateley OR Camberley OR Farnborough) CV -job -vacancy</div>
</div>
<div class="section"><div class="sec-t">Step-by-step workflow</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Open Google — not LinkedIn</div><div class="step-b">Go to google.co.uk. Paste your X-Ray string into the search bar exactly as written.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Review results</div><div class="step-b">Google shows LinkedIn profiles, personal sites, PDF CVs. Scan titles and snippets. Click through on anything promising.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Refine</div><div class="step-b">Too many results: add specific terms or exclusions. Too few: remove a term, widen location, or try OR variants.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Save the string</div><div class="step-b">Copy working strings into a notes doc with the role and date. You will reuse these for similar roles in future.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Add to Atlas</div><div class="step-b">Any candidate found via X-Ray goes into Atlas immediately — even before you have spoken to them. Log source as X-Ray.</div></div></div>
<div class="tip">Use Google Tools menu to filter by "Past year" — removes old results and surfaces recently updated profiles.</div>
<div class="warn">LinkedIn profiles found via X-Ray are public snapshots. Data may be out of date. Always check the actual profile before reaching out.</div>
</div>`,

'linkedin': `<div class="section"><div class="sec-t">The Syntech LinkedIn approach</div>
<div class="card"><div class="card-body">Steve has built a LinkedIn network of 13,000+ connections — predominantly engineering and technical professionals across the UK. This is Syntech's most valuable sourcing asset. Before going to CV Library or X-Ray, always check whether the right candidates are already in the network.</div></div>
</div>
<div class="section"><div class="sec-t">Boolean on LinkedIn</div>
<div class="code">Title field examples:
"vinyl graphics technician" OR "vinyl technician" OR "graphics operative"
"welder fabricator" OR "TIG welder" OR "coded welder"

Keyword field with exclusions:
TIG AND (aluminium OR stainless) NOT "structural steel" NOT recruitment</div>
<div class="tip">Putting terms in the Title field is far more precise than All Keywords — it matches people whose actual job title includes those words.</div>
</div>
<div class="section"><div class="sec-t">Using filters</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Location filter</div><div class="step-b">Search: Yateley, Camberley, Farnborough, Fleet, Sandhurst, Hook, Bracknell. Add each town separately to build the right radius without overshooting into London.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Industry filter</div><div class="step-b">Vinyl: Printing, Design, Packaging. Welder: Manufacturing, Mechanical or Industrial Engineering, Automotive.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Connections filter</div><div class="step-b">1st connections first — message directly for free. 2nd connections — InMail or connection request required. 3rd+ — connection request first.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Open to Work filter</div><div class="step-b">OTW candidates have actively signalled they are looking. Contact these first. But do not ignore passive profiles — many of the best candidates are not waving a flag.</div></div></div>
</div>
<div class="section"><div class="sec-t">Messaging strategy</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">1st connection — direct message</div><div class="card-body">Free. Short and direct. Name the role, location, salary, one specific reason it suits them. Ask a question at the end. Do not paste the full job spec.</div></div>
<div class="card"><div class="card-title" style="color:var(--bl)">2nd connection — InMail or connect</div><div class="card-body">Send a personalised connection request. Reference something specific from their profile. Once connected, follow up with the role.</div></div>
</div>
<div class="card" style="margin-top:8px"><div class="card-title">Message framework</div><div class="card-body">Hi [Name], I came across your profile while searching for [role type] in [location]. I have a permanent [job title] opportunity with a well-established signage manufacturer in Yateley — up to [salary], Monday to Friday days. Given your background in [specific detail from profile], it could be worth a conversation. Are you open to hearing more? [Name], Syntech Recruitment.</div></div>
<div class="warn">Do not send the same message to every candidate. Spend 30 seconds reading each profile — one specific detail doubles your response rate.</div>
</div>
<div class="section"><div class="sec-t">Connection strategy</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Connect proactively with target candidates</div><div class="step-b">Even when not filling a relevant role right now. A future version of you will thank you when the right job lands.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Connect with every client contact</div><div class="step-b">Every hiring manager you speak to gets a connection request. Keeps Syntech visible and is useful for reverse marketing.</div></div></div>
<div class="tip">LinkedIn limits connection requests to approximately 100 per week. Be selective — targeted beats volume every time.</div>
</div>`,

'atlas': `<div class="section"><div class="sec-t">What is Atlas?</div>
<div class="card"><div class="card-body">Atlas is Syntech's Applicant Tracking System. Every candidate you speak to, every client you work with, and every job you are filling must be in Atlas. It is the single source of truth for the business. If it is not in Atlas, it does not exist.</div></div>
<div class="danger">Never store candidate information only in your head, a spreadsheet, or your inbox. GDPR compliance requires all candidates to be in Atlas. If a candidate asks to be removed from our records, we can only action that request if they are in the system.</div>
</div>
<div class="section"><div class="sec-t">Adding a candidate</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Search first — always check for duplicates</div><div class="step-b">Before adding anyone, search Atlas for their name and email. If they already exist, update their record rather than creating a new one.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Create the record</div><div class="step-b">Click New Candidate. Fill in: full name, email, phone, current location, current job title, current employer. All fields required.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Record the source</div><div class="step-b">Always note where you found them: CV Library, Indeed, LinkedIn, X-Ray, referral, or inbound. The source field is critical for reporting.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Upload the CV</div><div class="step-b">Attach the CV immediately. Files tab, Upload. Name clearly: Firstname_Lastname_CV_Month2026.pdf.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Add a note</div><div class="step-b">Even before speaking to them: note why you added them and which role you are considering them for.</div></div></div>
</div>
<div class="section"><div class="sec-t">Writing notes correctly</div>
<div class="card"><div class="card-title">Note format</div><div class="card-body">Every note must answer: What happened? What was agreed? What is the next step? Example: "Spoke to Sarah 15 Jul — interested in Vinyl Tech role, Yateley. Available 2 weeks. Wants min £32k. Happy to interview Tue/Thu. Will send CV to Zac to review. Chase Friday if no update."</div></div>
<div class="tip">Write notes as if someone else needs to pick up this candidate tomorrow morning. Because sometimes they will.</div>
<div class="warn">Log notes same day — ideally within the hour. Memory degrades fast when you are working 10+ roles.</div>
</div>
<div class="section"><div class="sec-t">Adding client contacts</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Find or create the company record first</div><div class="step-b">Search for the client company. If it exists, open it. If not, create the Company record before adding any contacts.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Add the contact under the company</div><div class="step-b">Within the company record, go to Contacts, click Add. Name, job title, email, phone, LinkedIn. Add at least two contacts per client — main hiring manager and a backup.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Log every client interaction</div><div class="step-b">Every call, email, or meeting with a client goes on their contact record as a note. If you leave Syntech tomorrow, someone needs to pick up the relationship immediately.</div></div></div>
</div>
<div class="section"><div class="sec-t">Pipeline stages</div>
<table><thead><tr><th>Stage</th><th>Meaning</th><th>Action required</th></tr></thead><tbody>
<tr><td>New</td><td>Added, not yet contacted</td><td>Call or message within 24 hours</td></tr>
<tr><td>Contacted</td><td>Message sent, awaiting reply</td><td>Follow up if no reply in 48 hours</td></tr>
<tr><td>Qualified</td><td>Spoken to, meets brief</td><td>Brief client, get permission to submit</td></tr>
<tr><td>Submitted</td><td>CV sent to client</td><td>Chase client feedback within 48 hours</td></tr>
<tr><td>Interview arranged</td><td>Interview confirmed</td><td>Prep candidate, confirm logistics</td></tr>
<tr><td>Interview complete</td><td>Interview done</td><td>Get feedback from both sides same day</td></tr>
<tr><td>Offer</td><td>Offer made</td><td>Manage negotiation, confirm in writing</td></tr>
<tr><td>Placed</td><td>Start date agreed</td><td>Confirm start, schedule check-in call</td></tr>
<tr><td>Rejected</td><td>Not progressing</td><td>Log reason, keep candidate warm</td></tr>
</tbody></table>
<div class="danger">Move candidates through stages in real time — not at the end of the day. A stale pipeline is a lying pipeline and you will make decisions based on false information.</div>
</div>
<div class="section"><div class="sec-t">What you can do vs what to ask Nick first</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">Do independently</div><div class="card-body">Add candidates. Upload CVs. Leave notes. Move pipeline stages. Add client contacts. Log interactions. Run candidate searches. Build outreach lists.</div></div>
<div class="card"><div class="card-title" style="color:var(--a)">Ask Nick first</div><div class="card-body">Delete any record. Merge duplicate companies. Change billing or commercial terms. Bulk email more than 50 candidates. Change pipeline stage definitions or tags.</div></div>
</div></div>`,

'revmkt': `<div class="section"><div class="sec-t">What is reverse marketing?</div>
<div class="card"><div class="card-body"><strong style="color:var(--t)">Standard recruitment:</strong> client has a vacancy, you find a candidate.<br><br><strong style="color:var(--t)">Reverse marketing:</strong> you have a strong candidate, you find a client who would want to hire them.<br><br>This is how Syntech generates new clients and fills roles that do not yet exist. A well-placed spec can open a relationship with a company who had no live vacancy — because you showed them someone too good to ignore.</div></div>
<div class="tip">Reverse marketing works best when the candidate is genuinely strong, has a clear skill set, is available soon, and has given you permission to represent them. Never spec a candidate without their explicit consent.</div>
</div>
<div class="section"><div class="sec-t">Which candidates make a good spec?</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">Good spec candidates</div><div class="card-body">Niche or hard-to-find skill set. Available within 2–4 weeks. Willing to move for the right opportunity. Clean employment history. Specific achievements. Realistic salary expectation. Commutable to your target geography.</div></div>
<div class="card"><div class="card-title" style="color:var(--a)">Not suitable for a spec</div><div class="card-body">Too generalist — no clear specialism. Unrealistic salary. Notice period of 3+ months without something very special. Has not given consent to be marketed.</div></div>
</div></div>
<div class="section"><div class="sec-t">Building the spec — 4 steps</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Get consent</div><div class="step-b">Call the candidate. Explain: "I think you are strong enough to market proactively — I would like to send a brief spec to 3–5 companies I think would suit you. Are you happy for me to do that?" Get verbal confirmation and log it in Atlas.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Gather the details</div><div class="step-b">You need: current role and employer (not named in the spec). Years of experience. 3–4 strongest skills or achievements. Specific tools and certifications. Location, commute flexibility, salary expectation, availability date.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Write the spec — one page, anonymised</div><div class="step-b">No name, no current employer. Focus on what they can do and what they have achieved. Use specific numbers. Write as if you are selling the person, not describing them.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Steve reviews before sending</div><div class="step-b">All specs reviewed by Steve before they go anywhere. He checks: accuracy, tone, whether the candidate is genuinely specworthy, and which companies to target.</div></div></div>
</div>
<div class="section"><div class="sec-t">Example spec — Vinyl Graphics Specialist</div>
<div class="spec-preview">
<p><strong style="color:var(--g)">CANDIDATE OVERVIEW — VINYL GRAPHICS SPECIALIST</strong></p>
<p>Available: 2 weeks notice | Location: Hampshire/Surrey | Salary: £30–34k</p>
<p style="margin-top:10px"><strong style="color:var(--t)">Background</strong></p>
<p>Experienced vinyl graphics technician with 6+ years in signage and vehicle wrapping. Currently with a well-established signage manufacturer in the South East. Seeking a new challenge with more project variety.</p>
<p style="margin-top:8px"><strong style="color:var(--t)">Key skills</strong></p>
<p>Gerber Graphics Advantage (Spandex Composer) — daily user, 5 years. Zund plotter operation and maintenance. Cut, weed, and application of vehicle, retail, and architectural vinyl. Customer artwork editing and file prep. Works to tight production deadlines in high-volume environment.</p>
<p style="margin-top:8px"><strong style="color:var(--t)">Availability</strong></p>
<p>2 weeks notice. Commutable within 25 miles of GU46. Seeking Monday–Friday days, permanent role.</p>
</div></div>
<div class="section"><div class="sec-t">Outreach email templates</div>
<div style="font-size:11px;color:var(--td);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Known contact at an existing client</div>
<div class="code">Subject: Vinyl Graphics Technician — 2 weeks notice, Hampshire

Hi [Name],

Hope all is well. I have a strong vinyl technician available who I thought of you for immediately.

6 years in signage production, daily Gerber Advantage user, Zund experience. Hampshire based. £30–34k, available in 2 weeks.

Worth a conversation? I can get a full spec and CV across within the hour.

[Your name] | Syntech Recruitment | 01276 405 870</div>
<div style="font-size:11px;color:var(--td);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">Cold outreach to a new prospect</div>
<div class="code">Subject: Available now — TIG/MIG Welder Fabricator, Hampshire, £38–40k

Hi [Name],

[Your name] from Syntech Recruitment — we specialise in engineering and technical roles across the South East.

I have a welder fabricator currently available who could be a strong fit. TIG and MIG on steel, stainless, and aluminium. 8 years fabrication, works from drawings. Hampshire based, 2 weeks notice, around £38–40k.

Open to a brief spec? No obligation — just sharing a strong candidate in case the timing is right.

[Your name] | Syntech Recruitment | 01276 405 870</div>
<div class="warn">Cold spec emails must come from Steve or with Steve approval until you have been signed off on BD outreach. You are representing Syntech commercially.</div>
</div>`,

'comms': `<div class="section"><div class="sec-t">The golden rule</div>
<div class="card"><div class="card-body">Clients who do not hear from you assume nothing is happening. Even a 30-second update call or a two-line email keeps the relationship alive and demonstrates you are working the role. Silence is the fastest way to lose a client — not a bad shortlist, not a failed interview, but silence.</div></div>
</div>
<div class="section"><div class="sec-t">Update cadence</div>
<div class="card"><div class="card-title">When you submit CVs</div><div class="card-body">Email the CVs and call 30 minutes later to confirm receipt and talk through the candidates briefly. Do not fire CVs over and wait — that is what every other recruiter does.</div></div>
<div class="card"><div class="card-title">48 hours after submission — no feedback</div><div class="card-body">Call to chase. "Hi [Name], following up on the CVs I sent for the [Role] — have you had a chance to look? Any initial thoughts?" Do not apologise for chasing. It is your job.</div></div>
<div class="card"><div class="card-title">End of every week — active roles</div><div class="card-body">Brief written update for every active role. Even if it is just "still searching, expect CVs Monday." Two lines prevents the client anxiety that builds over a silent weekend.</div></div>
<div class="card"><div class="card-title">After every interview</div><div class="card-body">Get verbal feedback from the client the same day. Do not wait for them to call you. "How did it go? Was [Name] what you expected? Any concerns?"</div></div>
</div>
<div class="section"><div class="sec-t">Email templates</div>
<div style="font-size:11px;color:var(--td);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">CV submission</div>
<div class="code">Subject: [Job title] — [number] CVs for review

Hi [Name],

Please find attached [number] CVs for the [Job title] role.

Quick summary:
• [Candidate 1] — [key strength, availability, salary]
• [Candidate 2] — [key strength, availability, salary]
• [Candidate 3] — [key strength, availability, salary]

I will call shortly to talk through them. Let me know if any stand out.

[Name] | Syntech Recruitment</div>
<div style="font-size:11px;color:var(--td);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">Weekly update — no CVs yet</div>
<div class="code">Subject: [Job title] update — w/e [date]

Hi [Name],

Quick update on the [Job title] search.

Spoken with [number] candidates this week. [X] being progressed — expect [number] CVs across by [specific day].

Main challenge has been [honest note on market]. Taking [specific action] to address this.

In touch [specific day].

[Name] | Syntech Recruitment</div>
</div>
<div class="section"><div class="sec-t">Managing expectations</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Set realistic timelines at the start</div><div class="step-b">On the briefing call, tell the client how long the search will realistically take. If TIG welders in Hampshire with aluminium experience are genuinely scarce — say so upfront.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Flag problems early</div><div class="step-b">If you are struggling, tell the client within 48–72 hours — not after two weeks of silence. "The salary is below market for this skill set — is there flexibility?" is a much easier conversation at day 3 than day 14.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Never overpromise</div><div class="step-b">Do not say "5 CVs by tomorrow" unless certain. An expectation set and missed destroys trust. An expectation set at 3 and delivered at 3 builds it.</div></div></div>
</div>
<div class="section"><div class="sec-t">Tone — what works vs what does not</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">Right approach</div><div class="card-body">Confident, direct, specific. Know your candidates. Have an opinion. "I would strongly recommend interviewing Sarah — she is the best we have seen for this role." Clients pay for your expertise, not just database access.</div></div>
<div class="card"><div class="card-title" style="color:var(--r)">Wrong approach</div><div class="card-body">Vague, apologetic, passive. "I have sent a few CVs, let me know what you think." "Sorry for chasing." You are a specialist. Act like one.</div></div>
</div>
<div class="danger">Never tell a client a candidate is "definitely interested" unless you have spoken to them that day and confirmed it. Candidate availability and interest changes — always verify before committing.</div>
</div>`,

'delays': `<div class="section"><div class="sec-t">Why pipelines stall</div>
<div class="card"><div class="card-body">Every recruitment pipeline has natural friction points. Most delays are predictable — you can see them coming and act before a candidate withdraws or a client loses interest. The recruiter who proactively manages delays places more than the one who waits for things to move on their own.</div></div>
</div>
<div class="section"><div class="sec-t">The delay map</div>
<table><thead><tr><th>Stage</th><th>Common delay</th><th>How to unblock</th></tr></thead><tbody>
<tr><td><span class="signal" style="background:var(--bl)"></span>Brief received</td><td>No reply to questions. Brief is vague.</td><td>Call — do not email. Ask: "What is the number one skill this person needs?" Get a 20-minute briefing call confirmed.</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>CVs submitted</td><td>Client not responding. No feedback after 48h.</td><td>Call, not email. "Did the CVs land? Any initial reactions?" If still no reply after second chase — escalate to Steve.</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>Interview arranged</td><td>Client keeps rescheduling. Candidate gets cold feet.</td><td>For client: confirm with calendar invite. For candidate: call day before. Rescheduling more than once is a red flag — flag to Steve.</td></tr>
<tr><td><span class="signal" style="background:var(--r)"></span>Post-interview</td><td>Client goes quiet. No feedback for 72+ hours.</td><td>Call the client same day of interview. "How did it go?" Do not wait for them to call you.</td></tr>
<tr><td><span class="signal" style="background:var(--r)"></span>Offer stage</td><td>Client delays making offer. Candidate gets counter-offered.</td><td>For client: "I need to let the candidate know by [date] — can you confirm today?" For candidate: pre-handle counter-offers before they happen.</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>Notice period</td><td>Client gets impatient. Another agency fills the gap.</td><td>Keep regular contact with the candidate. Manage client expectations actively. Do not let silence creep in during a long notice period.</td></tr>
</tbody></table>
</div>
<div class="section"><div class="sec-t">Escalation rules</div>
<div class="card"><div class="card-title" style="color:var(--a)">Flag to Zac when</div><div class="card-body">You have chased a client twice with no response. A candidate is becoming unresponsive. A role brief is unclear and you cannot get clarity. You are unsure how to handle a candidate objection.</div></div>
<div class="card"><div class="card-title" style="color:var(--r)">Flag to Steve immediately when</div><div class="card-body">A client mentions they are talking to another agency. An offer is delayed by more than 48 hours. A candidate withdraws or accepts a counter-offer. A client says they are pausing the role. You receive any complaint.</div></div>
<div class="danger">Never try to handle a client complaint or a withdrawal alone. These situations can be rescued — but only if Steve knows in time. Delaying the escalation is what loses the placement.</div>
</div>
<div class="section"><div class="sec-t">Counter-offers — how to handle them</div>
<div class="card"><div class="card-body">A counter-offer is when a candidate hands in their notice and their employer offers more money to stay. It is one of the most common reasons placements fall through — and almost always preventable.<br><br>Handle it before it happens. During qualification ask directly: "If your current employer matched the salary to keep you, would you still leave?" Most candidates have a reason to move that is not just money. Find that reason and remind them of it throughout the process.<br><br>If their only reason to move is salary, they are a high counter-offer risk — flag to Steve immediately.</div></div>
<div class="tip">Candidates who have already been counter-offered once are very likely to be counter-offered again. Ask: "Has this happened to you before?" If yes, treat them as high risk.</div>
</div>
<div class="section"><div class="sec-t">Early warning checklist</div>
<div class="warn">If any of these are true, a placement may be at risk — act immediately.</div>

// ── STATE ────────────────────────────────────────────────────────────────

let CUR = 'ayaan';
let S = {};

function ld(){try{const d=localStorage.getItem('syt5');if(d)S=JSON.parse(d);}catch(e){}}
function sv(){try{localStorage.setItem('syt5',JSON.stringify(S));}catch(e){}}
function k(id){return CUR+'_'+id;}
function isChk(id){return!!S[k(id)];}
function isSgn(sid,p){return!!S[k('so_'+sid+'_'+p)];}
function sgnTs(sid,p){return S[k('ts_'+sid+'_'+p)]||'';}
function isUnlk(sid){return!!S[k('ul_'+sid)];}
function allDone(stage){return stage.pillars.every(p=>p.tasks.every(t=>isChk(t.id)));}
function allSgn(sid){return['z','n','s'].every(p=>isSgn(sid,p));}
function stageDone(stage){return isUnlk(stage.id)||(allDone(stage)&&allSgn(stage.id));}
function taskCount(stage){let tot=0,dn=0;stage.pillars.forEach(p=>p.tasks.forEach(t=>{tot++;if(isChk(t.id))dn++;}));return{tot,dn};}
function totalProg(){let tot=0,dn=0;STAGES[CUR].forEach(s=>s.pillars.forEach(p=>p.tasks.forEach(t=>{tot++;if(isChk(t.id))dn++;})));return{tot,dn,pct:tot?Math.round(dn/tot*100):0};}

// ── VIEWS ────────────────────────────────────────────────────────────────

function setView(v){
  document.querySelectorAll('.vw').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.mt-btn').forEach(el=>el.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.getElementById('tab-'+v).classList.add('on');
}

function setMod(id,btn){
  document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const el=document.getElementById('mod-content');
  if(el)el.innerHTML=MODS[id]||'<p style="color:var(--tm)">Module not found.</p>';
  // init job tabs if needed
  if(id==='jobs'){jTab('v',document.getElementById('jt-v'));}
}

function jTab(id,el){
  ['v','w','b'].forEach(x=>{
    const p=document.getElementById('jp-'+x);
    const t=document.getElementById('jt-'+x);
    if(p)p.style.display=x===id?'block':'none';
    if(t){t.classList.toggle('on',x===id);}
  });
}

function goModule(id){
  setView('modules');
  const btns=document.querySelectorAll('.mn-btn');
  const ids=['cv-library','indeed','xray','linkedin','atlas','revmkt','comms','delays','jobs','camberley'];
  const idx=ids.indexOf(id);

}

// ── RENDER ───────────────────────────────────────────────────────────────

function render(){
  syncLocks();
  renderSidebar();
  renderOverview();
  renderPlan();
}

function syncLocks(){
  const stages=STAGES[CUR];
  stages.forEach((s,i)=>{
    s._locked=i>0&&!stageDone(stages[i-1]);
  });
}

function renderSidebar(){
  const stages=STAGES[CUR];
  let h='<div class="sb-sec">Stages</div>';
  stages.forEach((s,i)=>{
    const dn=stageDone(s),lk=s._locked;
    const c=taskCount(s);
    const dot=dn?'dn':lk?'lk':'';
    const bg=dn?'<span class="sb-bg bg-d">Done</span>':lk?'<span class="sb-bg bg-l">Locked</span>':`<span class="sb-bg bg-a">${c.dn}/${c.tot}</span>`;
    h+=`<div class="sb-row" onclick="scrollToStage('${s.id}')"><div class="sb-dot ${dot}"></div><div class="sb-nm">${s.title.split('—')[1]?.trim()||s.title}</div>${bg}</div>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}

function renderOverview(){
  const p=totalProg();
  const ti=CUR==='ayaan'?{nm:'Ayaan',rl:'Trainee Delivery Consultant',cl:'#378ADD',in:'AY'}:{nm:'Jade',rl:'Delivery Consultant',cl:'#D4537E',in:'JD'};
  const cmp=STAGES[CUR].filter(s=>stageDone(s)).length;
  document.getElementById('overview').innerHTML=`
    <div class="tc"><div class="av" style="background:${ti.cl}22;color:${ti.cl}">${ti.in}</div><div><div style="font-size:12px;font-weight:500">${ti.nm}</div><div style="font-size:10px;color:var(--tm)">${ti.rl}</div></div></div>
    <div><div class="ov-n">${p.dn}</div><div class="ov-l">Tasks done</div></div>
    <div><div class="ov-n">${cmp}</div><div class="ov-l">Stages complete</div></div>
    <div style="flex:1"><div class="pt"><div class="pf" style="width:${p.pct}%"></div></div><div class="ov-l">${p.pct}% complete — ${p.tot-p.dn} remaining</div></div>`;
}

function renderPlan(){
  const stages=STAGES[CUR];
  const ti=CUR==='ayaan'?'Ayaan':'Jade';
  let h='';

  stages.forEach((s,i)=>{
    const lk=s._locked,dn=stageDone(s),c=taskCount(s);
    let cls='sc';if(dn)cls+=' dn';if(lk)cls+=' lk';

    h+=`<div class="${cls}" id="${s.id}">
      <div class="sh" onclick="toggleStage('${s.id}')">
        <div class="sn">${lk?'🔒':dn?'✓':i+1}</div>
        <div style="flex:1"><div class="st">${s.title}</div><div class="ss">${s.sub}</div></div>
        <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
          <span class="wt ${s.wc}">${s.wk}</span>
          <span style="font-size:10px;color:var(--td);font-family:var(--m)">${c.dn}/${c.tot}</span>
        </div>
        <svg class="cv" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="sb2">`;

    if(lk){
      h+=`<div class="ln"><span style="font-size:18px">🔒</span><div class="lt">Locked — complete <strong>${stages[i-1]?.title||'previous stage'}</strong> and get all three sign-offs to unlock.</div></div>`;
    } else {
      s.pillars.forEach(pl=>{
        const pd=pl.tasks.filter(t=>isChk(t.id)).length;
        h+=`<div class="ps"><div class="ph"><div class="pd" style="background:${pl.cl}"></div><div class="pn" style="color:${pl.cl}">${pl.nm}</div><div class="pp">${pd}/${pl.tasks.length}</div></div><div class="tl">`;
        pl.tasks.forEach(t=>{
          const ck=isChk(t.id);
          h+=`<div class="ti${ck?' dn':''}" id="tr-${t.id}">
            <div class="ck${ck?' on':''}" onclick="doCheck('${t.id}','${s.id}')"></div>
            <div><div class="tx">${t.tx}</div><span class="tg tg-${pl.ow}">${pl.ow==='z'?'zac':pl.ow==='n'?'nick':'steve'}</span><span class="kp">${t.kp}</span></div>
          </div>`;
        });
        h+=`</div></div>`;
      });

      if(dn)h+=`<div class="cb on">✓ Stage complete — all tasks done and all three managers have signed off.</div>`;

      h+=`<div class="ks">${s.kpis.map(kp=>`<div class="ki"><div class="kn">${kp.n}</div><div class="kl">${kp.l}</div></div>`).join('')}</div>`;

      // signoff
      const canSign=allDone(s);
      const sgnCnt=['z','n','s'].filter(p=>isSgn(s.id,p)).length;
      const pNm={z:'Zac',n:'Nick',s:'Steve'},pRl={z:'Delivery & Pitch',n:'ATS & Commercial',s:'BD & Quality'},pAv={z:'az',n:'an',s:'as'};
      h+=`<div class="sg"><div class="sg-t">✍ Stage sign-off — all three managers must approve before progression</div><div class="sg-g">`;
      ['z','n','s'].forEach(p=>{
        const sg=isSgn(s.id,p),ts=sgnTs(s.id,p);
        const bc=sg?'on':canSign?'':'off';
        h+=`<div class="sg-i"><div class="sg-p"><div class="sg-av ${pAv[p]}">${pNm[p][0]}</div><div><div class="sg-nm">${pNm[p]}</div><div class="sg-rl">${pRl[p]}</div></div></div>
          <button class="sg-btn ${bc}" onclick="doSign('${p}','${s.id}')">${sg?'✓ Signed off':'Sign off'}</button>
          ${ts?`<div class="sg-ts">${ts}</div>`:''}
        </div>`;
      });
      h+=`</div>`;
      let gd2='lk',gt='',showUnlk=false;const nxt=stages[i+1];
      if(!canSign){gt=`Complete all <strong>${c.tot-c.dn} remaining tasks</strong> before sign-off can begin`;}
      else if(sgnCnt<3){gd2='pt';const rem=['z','n','s'].filter(p=>!isSgn(s.id,p)).map(p=>pNm[p]).join(', ');gt=`${sgnCnt}/3 signed — waiting on <strong>${rem}</strong>`;}
      else if(!dn){gd2='op';gt='All 3 sign-offs complete — <strong>ready to unlock next stage</strong>';if(nxt)showUnlk=true;}
      else{gd2='op';gt='<strong>Stage complete</strong> — next stage unlocked';}
      h+=`<div class="gb"><div class="gd2 ${gd2}"></div><div class="gt">${gt}</div>
        <button class="ub${showUnlk?' on':''}" onclick="doUnlock('${s.id}','${nxt?.id||''}')">Unlock stage ${i+2} →</button>
      </div></div>`;
    }
    h+=`</div></div>`;
  });

  // MODULE CARDS
  const cards=MC[CUR];
  h+=`<div class="mc-sec">
    <div class="mc-hdr">Training Modules <span>— THAT TURN YOU INTO A £20K+ PER MONTH BILLER</span></div>
    <div class="mc-sub">What ${ti} will master — and exactly why it matters commercially.</div>
    <div class="mc-grid">`;
  cards.forEach(m=>{
    h+=`<div class="mc">
      <div class="mc-top"><span class="mc-ic">${m.ic}</span><div class="mc-ti">${m.ti}</div><span class="mc-tm">${m.tm}</span></div>
      <div class="mc-lrn"><strong>What ${ti} masters:</strong> ${m.lrn}</div>
      <div class="mc-com">💰 ${m.com}</div>
      <div class="mc-ms">🎯 <strong>Milestone:</strong> ${m.ms}</div>
      <button class="mc-btn" onclick="goModule('${m.id}')">Open full module →</button>
    </div>`;
  });
  h+=`</div></div>`;

  document.getElementById('plan-main').innerHTML=h;
  stages.forEach(s=>{if(!s._locked&&!stageDone(s)){const el=document.getElementById(s.id);if(el)el.classList.add('op');}});
}

// ── ACTIONS ──────────────────────────────────────────────────────────────

function toggleStage(id){const el=document.getElementById(id);if(el)el.classList.toggle('op');}
function scrollToStage(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

function doCheck(tid,sid){
  S[k(tid)]=!S[k(tid)];sv();
  const row=document.getElementById('tr-'+tid);
  if(row){row.classList.toggle('dn',!!S[k(tid)]);const box=row.querySelector('.ck');if(box)box.classList.toggle('on',!!S[k(tid)]);}
  render();const el=document.getElementById(sid);if(el)el.classList.add('op');
  if(S[k(tid)])showToast('✓ Task complete','Speed is everything — keep going.');
}

function doSign(p,sid){
  const s=STAGES[CUR].find(x=>x.id===sid);
  if(!s||isSgn(sid,p)||!allDone(s))return;
  S[k('so_'+sid+'_'+p)]=true;
  const now=new Date();
  S[k('ts_'+sid+'_'+p)]=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  sv();
  const nm={z:'Zac',n:'Nick',s:'Steve'}[p];
  showToast(`✍ ${nm} signed off`,'Sign-off recorded and timestamped.');
  render();const el=document.getElementById(sid);if(el)el.classList.add('op');
}

function doUnlock(sid,nid){
  if(!allSgn(sid))return;
  S[k('ul_'+sid)]=true;sv();
  showToast('🚀 Next stage unlocked!','All three sign-offs accepted.');
  render();
  if(nid)setTimeout(()=>{const el=document.getElementById(nid);if(el){el.classList.add('op');el.scrollIntoView({behavior:'smooth',block:'start'});}},300);
}

function setTrainee(name){
  CUR=name;
  document.getElementById('btn-a').classList.toggle('on',name==='ayaan');
  document.getElementById('btn-j').classList.toggle('on',name==='jade');
  render();
}

function doReset(){
  if(!confirm('Reset ALL progress for '+(CUR==='ayaan'?'Ayaan':'Jade')+'? Cannot be undone.'))return;
  Object.keys(S).forEach(key=>{if(key.startsWith(CUR+'_'))delete S[key];});
  sv();render();showToast('↺ Progress reset','Training plan cleared.');
}

let _tt;
function showToast(title,body){
  const el=document.getElementById('toast');
  document.getElementById('toast-t').textContent=title;
  document.getElementById('toast-b').textContent=body;
  el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),3000);
}

// ── INIT ─────────────────────────────────────────────────────────────────

ld();
render();
setMod('cv-library',document.querySelector('.mn-btn'));
</script>
